<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Prompt Router Gateway</title>
    
    <!-- Premium Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;850&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS CDN Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // High-end obsidian slate white theme color systems
              dark: {
                950: "#f8fafc", // Crisp light slate background page
                900: "#ffffff", // Pure white card elements, sidebar and panels
                850: "#f1f5f9", // Elegant slate 100 controls and active options
                800: "#e2e8f0", // Subtle border dividing lines
                700: "#cbd5e1", // Subtle focus borders
                600: "#94a3b8", // Slate icon indicators
                500: "#64748b", // Slate secondary subtexts
                400: "#475569", // Slate headings
              },
              brand: {
                50: "#eff6ff",
                100: "#dbeafe",
                500: "#3b82f6", // Royal Blue accent
                600: "#2563eb", // Deep Royal Blue primary button
                700: "#1d4ed8", // Dark active blue
              }
            },
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
            }
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
